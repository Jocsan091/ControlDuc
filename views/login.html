<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ControlDoc - Iniciar Sesión</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="login-body">
  
  <div class="container d-none" id="pantallaLogin">
    <h2>ControlDoc</h2>
    <p class="text-muted mb-3" id="subtituloLogin">Acceso exclusivo Inspectoría</p>
    
    <form id="formLogin">
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Usuario:</label>
        <input type="text" id="loginUsuario" placeholder="Tu nombre de usuario" class="input-global w-100" required>
      </div>
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Contraseña:</label>
        <input type="password" id="loginPassword" placeholder="Tu contraseña" class="input-global w-100" required>
      </div>
      
      <button type="submit" class="btn-principal w-100 py-2 fs-md mt-2">Iniciar Sesión</button>
      <div id="errorLogin" class="text-danger fw-bold mt-3 d-none">Usuario o contraseña incorrectos.</div>
    </form>
  </div>

  <div class="container d-none" id="pantallaSetup">
    <h2 class="text-primary">¡Bienvenido!</h2>
    <p class="text-muted mb-4 fs-sm">Parece que es la primera vez que abres ControlDoc. Vamos a configurar tu sistema principal.</p>
    
    <form id="formSetup">
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Nombre de la Institución:</label>
        <input type="text" id="setupColegio" placeholder="Ej: Liceo Bicentenario" class="input-global w-100" required maxlength="50">
      </div>

      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Crea tu Usuario de Acceso:</label>
        <input type="text" id="setupUsuario" placeholder="Ej: inspector_general" class="input-global w-100" required maxlength="20">
      </div>

      <div class="text-left mb-4">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Crea tu Contraseña Maestra:</label>
        <input type="password" id="setupPass" placeholder="Mínimo 6 caracteres" class="input-global w-100 mb-2" required minlength="6">
        <input type="password" id="setupPassConfirm" placeholder="Confirma tu contraseña" class="input-global w-100" required minlength="6">
      </div>
      
      <button type="submit" class="btn-principal w-100 py-2 fs-md">Guardar y Comenzar</button>
      <div id="errorSetup" class="text-danger fw-bold mt-3 d-none">Las contraseñas no coinciden.</div>
    </form>
  </div>

  <script src="../assets/js/datos.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
