<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ControlDocentes - Iniciar Sesi&oacute;n</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="login-body">
  <div class="container d-none" id="pantallaLogin">
    <h2>ControlDocentes</h2>
    <p class="text-muted mb-3" id="subtituloLogin">Acceso exclusivo Inspector&iacute;a</p>

    <form id="formLogin">
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Usuario:</label>
        <input type="text" id="loginUsuario" placeholder="Tu nombre de usuario" class="input-global w-100" required>
      </div>
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Contrase&ntilde;a:</label>
        <div class="password-field">
          <input type="password" id="loginPassword" placeholder="Tu contrase&ntilde;a" class="input-global w-100 password-input" required>
          <button type="button" class="password-toggle" data-target="loginPassword" aria-label="Mostrar contraseña">Mostrar</button>
        </div>
      </div>

      <button type="submit" class="btn-principal w-100 py-2 fs-md mt-2">Iniciar Sesi&oacute;n</button>
      <div id="successLogin" class="text-success fw-bold mt-3 d-none">Usuario creado correctamente. Ahora inicia sesi&oacute;n.</div>
      <div id="errorLogin" class="text-danger fw-bold mt-3 d-none">Usuario o contrase&ntilde;a incorrectos.</div>
    </form>
  </div>

  <div class="container d-none" id="pantallaSetup">
    <h2 class="text-primary">&iexcl;Bienvenido!</h2>
    <p class="text-muted mb-4 fs-sm">Parece que es la primera vez que abres ControlDocentes. Vamos a configurar tu sistema principal.</p>

    <form id="formSetup">
      <div class="text-left mb-3">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Crea tu Usuario de Acceso:</label>
        <input type="text" id="setupUsuario" placeholder="Ej: inspector_general" class="input-global w-100" required maxlength="20">
      </div>

      <div class="text-left mb-4">
        <label class="fw-bold fs-sm text-primary mb-1 d-block">Crea tu Contrase&ntilde;a Maestra:</label>
        <div class="password-field mb-2">
          <input type="password" id="setupPass" placeholder="M&iacute;nimo 6 caracteres" class="input-global w-100 password-input" required minlength="6">
          <button type="button" class="password-toggle" data-target="setupPass" aria-label="Mostrar contraseña">Mostrar</button>
        </div>
        <div class="password-field">
          <input type="password" id="setupPassConfirm" placeholder="Confirma tu contrase&ntilde;a" class="input-global w-100 password-input" required minlength="6">
          <button type="button" class="password-toggle" data-target="setupPassConfirm" aria-label="Mostrar contraseña">Mostrar</button>
        </div>
      </div>

      <button type="submit" class="btn-principal w-100 py-2 fs-md">Guardar y Comenzar</button>
      <div id="errorSetup" class="text-danger fw-bold mt-3 d-none">Las contrase&ntilde;as no coinciden.</div>
    </form>
  </div>

  <script src="../assets/js/datos.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
